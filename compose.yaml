services:
  benz-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT_SHA: "${GIT_COMMIT_SHA:-unknown}"
        GIT_COMMIT_DATE: "${GIT_COMMIT_DATE:-}"
    image: benz-ai:local
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: "${DATABASE_URL:-}"
      DATABASE_SSL: "${DATABASE_SSL:-0}"
      DATABASE_SSL_INSECURE: "${DATABASE_SSL_INSECURE:-0}"
      ANALYTICS_HASH_SALT: "${ANALYTICS_HASH_SALT:-}"
      STATS_ADMIN_TOKEN: "${STATS_ADMIN_TOKEN:-}"
      CHROME_PATH: /usr/bin/chromium
      # Compose already isolates Chromium as a non-root, read-only process with
      # no-new-privileges; that flag prevents Chromium's setuid sandbox here.
      CHROME_NO_SANDBOX: "${CHROME_NO_SANDBOX:-1}"
      SBER_REFRESH_MS: "${SBER_REFRESH_MS:-60000}"
      SBER_ACTIVE_AREA_TTL_MS: "${SBER_ACTIVE_AREA_TTL_MS:-900000}"
      SBER_MAX_ACTIVE_AREAS: "${SBER_MAX_ACTIVE_AREAS:-10}"
      SBER_BROWSER_IDLE_MS: "${SBER_BROWSER_IDLE_MS:-30000}"
      SBER_REQUEST_TIMEOUT_MS: "${SBER_REQUEST_TIMEOUT_MS:-12000}"
      VIEWPORT_PROVIDER_TIMEOUT_MS: "${VIEWPORT_PROVIDER_TIMEOUT_MS:-12000}"
      RESULT_CACHE_MAX_ENTRIES: "${RESULT_CACHE_MAX_ENTRIES:-32}"
      PROVIDER_AREA_CACHE_MAX_ENTRIES: "${PROVIDER_AREA_CACHE_MAX_ENTRIES:-64}"
      GEOCODER_CACHE_MAX_ENTRIES: "${GEOCODER_CACHE_MAX_ENTRIES:-1000}"
      GEOCODER_QUEUE_MAX: "${GEOCODER_QUEUE_MAX:-100}"
      BENZUP_CACHE_TTL_MS: "${BENZUP_CACHE_TTL_MS:-300000}"
      REQUEST_RATE_WINDOW_MS: "${REQUEST_RATE_WINDOW_MS:-60000}"
      REQUEST_RATE_READS: "${REQUEST_RATE_READS:-90}"
      REQUEST_RATE_REFRESHES: "${REQUEST_RATE_REFRESHES:-3}"
      REQUEST_RATE_MAX_CLIENTS: "${REQUEST_RATE_MAX_CLIENTS:-10000}"
      TELEGRAM_POLLING_ENABLED: "${TELEGRAM_POLLING_ENABLED:-false}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_API_BASE_URL: "${TELEGRAM_API_BASE_URL:-https://api.telegram.org}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-chat}"
      DEEPSEEK_TIMEOUT_MS: "${DEEPSEEK_TIMEOUT_MS:-60000}"
      BENZUP_API_TOKEN: "${BENZUP_API_TOKEN:-}"
      BENZUP_API_URL: "${BENZUP_API_URL:-https://api.omt-consult.ru/v2/stations}"
      ENABLE_ALFA_AZS: "${ENABLE_ALFA_AZS:-1}"
      ALFA_AZS_CACHE_TTL_MS: "${ALFA_AZS_CACHE_TTL_MS:-60000}"
      ALFA_AZS_TIMEOUT_MS: "${ALFA_AZS_TIMEOUT_MS:-30000}"
      ALFA_AZS_ZOOM: "${ALFA_AZS_ZOOM:-14}"
      ENABLE_YANDEX_PRICES: "${ENABLE_YANDEX_PRICES:-1}"
      YANDEX_PRICE_LIMIT: "${YANDEX_PRICE_LIMIT:-0}"
      YANDEX_CACHE_MAX_ENTRIES: "${YANDEX_CACHE_MAX_ENTRIES:-1000}"
      GEOCODER_USER_AGENT: "${GEOCODER_USER_AGENT:-BenzAI/0.1 Docker fuel search}"
      SOURCE_USER_AGENT: "${SOURCE_USER_AGENT:-BenzAI/0.1 Docker fuel aggregator}"
    ports:
      - "${BENZ_AI_HOST_PORT:-3000}:3000"
    shm_size: 256mb
    tmpfs:
      - /tmp:size=512m,mode=1777
    read_only: true
    security_opt:
      - no-new-privileges:true
